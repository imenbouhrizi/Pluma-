{% extends "auth_base.html" %}

{% block content %}

<div class="figma-label">Reset Password</div>

<div class="auth-container">

    <div class="auth-left">
        <div class="brand">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="logo">
            <span>pluma</span>
        </div>

        <img class="auth-illustration reset-img"
             src="{{ url_for('static', filename='images/reset.png') }}"
             alt="reset password">

        <div class="welcome-text">
            <h2>Reset your password</h2>
            <p>Enter a new password to access your account</p>
        </div>
    </div>

    <div class="auth-right">
        <h1>Reset Password</h1>
        <p class="subtitle">Choose a strong password to secure your account</p>

        <!-- Formulaire de réinitialisation -->
        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">

            <label>New Password</label>
            <div class="input-box">
                <span><i class="bi bi-lock"></i></span>
                <input type="password" name="password" placeholder="at least 8 characters" required>
            </div>

            <label>Confirm Password</label>
            <div class="input-box">
                <span><i class="bi bi-lock"></i></span>
                <input type="password" name="confirm_password" placeholder="retype password" required>
            </div>

            <button type="submit" class="auth-btn">Reset Password</button>

            <p class="bottom-link">
                Remembered your password?
                <a href="{{ url_for('auth.login') }}">Login Here</a>
            </p>
        </form>
    </div>

</div>

{% endblock %}
