{% extends "dashboard_base.html" %}

{% block title %}Settings - Pluma{% endblock %}

{% block extra_css %}
<style>

.settings-container{
    max-width: 1000px;
    margin: auto;
}

/* HEADER */
.settings-header{
    margin-bottom: 25px;
}

.settings-header h1{
    font-size: 28px;
    font-weight: 700;
}

/* TABS */
.tabs{
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
    border-bottom: 1px solid #ddd;
}

.tabs a{
    padding: 10px 15px;
    text-decoration: none;
    color: #555;
    font-weight: 500;
    border-bottom: 2px solid transparent;
    transition: 0.3s;
}

.tabs a.active{
    color: #2d0b7e;
    border-bottom: 2px solid #2d0b7e;
}

/* CARDS */
.card-box{
    background: #fff;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    margin-bottom: 20px;
}

/* FORM */
.form-group{
    margin-bottom: 15px;
}

.form-group label{
    font-weight: 600;
    margin-bottom: 5px;
    display: block;
}

.form-group input,
.form-group select{
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 10px;
    outline: none;
}

.form-group input:focus{
    border-color: #2d0b7e;
}

/* BUTTON */
.btn-save{
    background: #2d0b7e;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    width: 100%;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.btn-save:hover{
    background: #1d0750;
}

/* CHECKBOX */
.checkbox{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

@media(max-width:768px){
    .tabs{
        flex-wrap: wrap;
    }
}

</style>
{% endblock %}

{% block dashboard_content %}

<div class="settings-container">

    <!-- HEADER -->
    <div class="settings-header">
        <h1>Settings</h1>
    </div>
<div class="form-group">
    <label>Profile Image</label>
    <input type="file" name="avatar" id="avatarInput" accept="image/*">
</div>

<!-- PREVIEW -->
<div class="text-center mt-3">
    <img id="preview"
         src="{{ url_for('static', filename='uploads/' + user.avatar) if user.avatar else 'https://cdn-icons-png.flaticon.com/512/3135/3135715.png' }}"
         style="width:120px;height:120px;border-radius:50%;object-fit:cover;">
</div>
    <!-- TABS -->
    <div class="tabs">
        <a href="#" class="active">Profile</a>
        <a href="#">Preferences</a>
        <a href="#">Security</a>
    </div>

    <!-- PROFILE CARD -->
    <div class="card-box">

        <h4 class="mb-3">Edit Profile</h4>

        <form method="POST">

            <div class="row g-3">

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" name="name" value="{{ user.name }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" value="{{ user.username }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ user.email }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Date of Birth</label>
                        <input type="date" name="dob" value="{{ user.date_of_birth }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>Country</label>
                        <input type="text" name="country" value="{{ user.country }}">
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label>City</label>
                        <input type="text" name="city" value="{{ user.city }}">
                    </div>
                </div>

            </div>

            <button type="submit" class="btn-save mt-3">
                Save Changes
            </button>

        </form>
    </div>

    <!-- PREFERENCES -->
    <div class="card-box">

        <h4>Preferences</h4>

        <div class="form-group">
            <label>Language</label>
            <select>
                <option>English</option>
                <option>Français</option>
                <option>العربية</option>
            </select>
        </div>

        <div class="checkbox">
            <input type="checkbox">
            <label>Email Notifications</label>
        </div>

        <div class="checkbox">
            <input type="checkbox">
            <label>SMS Alerts</label>
        </div>

    </div>

    <!-- SECURITY -->
    <div class="card-box">

        <h4>Security</h4>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" placeholder="Enter new password">
        </div>

        <div class="checkbox">
            <input type="checkbox">
            <label>Enable Two-Factor Authentication</label>
        </div>

    </div>

</div>

{% endblock %}
